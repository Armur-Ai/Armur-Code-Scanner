version: 2

builds:
  - id: vibescan-server
    main: ./cmd/server
    binary: vibescan-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: vibescan-cli
    dir: cli
    binary: vibescan
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: cli-archive
    builds:
      - vibescan-cli
    name_template: "vibescan_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: server-archive
    builds:
      - vibescan-server
    name_template: "vibescan-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

brews:
  - name: vibescan
    ids:
      - cli-archive
    repository:
      owner: Armur-Ai
      name: homebrew-tap
    homepage: "https://vibescan.dev"
    description: "Security Scanner for Vibe-Coded Software — SAST + DAST + exploit simulation"
    license: "MIT"
    install: |
      bin.install "vibescan"
    test: |
      system "#{bin}/vibescan", "version"
