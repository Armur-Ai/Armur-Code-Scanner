# Armur Code Scanner — GitLab CI Template
# -----------------------------------------------
# Add this to your project's .gitlab-ci.yml:
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/armur-ai/armur-code-scanner/main/docs/ci-templates/gitlab-ci.yml'
#
# Or copy the job below directly into your pipeline.
#
# Prerequisites:
#   - Set CI/CD variable: ARMUR_API_KEY (masked)
#   - Armur server must be accessible from your GitLab runner
#     (or use the Docker-based job below which starts its own server)

variables:
  ARMUR_SERVER_URL: "${ARMUR_SERVER_URL:-http://localhost:4500}"
  ARMUR_LANGUAGE: ""           # Set to go, py, or js; leave blank for auto-detect
  ARMUR_FAIL_ON_SEVERITY: "high"  # high, medium, low, info
  ARMUR_IMAGE: "armurscanner/armur:latest"

# ── Job: armur-security-scan ───────────────────────────────────────────
armur-security-scan:
  stage: test
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  before_script:
    # Start the Armur server in the background
    - |
      docker run -d \
        --name armur-server \
        --network host \
        -e ARMUR_API_KEY="${ARMUR_API_KEY}" \
        -v "${CI_PROJECT_DIR}:/workspace:ro" \
        "${ARMUR_IMAGE}"
    # Wait for the server to become healthy
    - |
      for i in $(seq 1 30); do
        if wget -qO- http://localhost:4500/health >/dev/null 2>&1; then
          echo "Armur server ready"
          break
        fi
        echo "Waiting ($i/30)..."
        sleep 2
      done
  script:
    # Trigger scan on the checked-out project
    - |
      RESPONSE=$(wget -qO- \
        --header="Content-Type: application/json" \
        --header="Authorization: Bearer ${ARMUR_API_KEY}" \
        --post-data="{\"local_path\":\"/workspace\",\"language\":\"${ARMUR_LANGUAGE}\"}" \
        http://localhost:4500/api/v1/scan/local)
      TASK_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['task_id'])")
      echo "TASK_ID=$TASK_ID"
    # Poll for scan completion (up to 10 minutes)
    - |
      for i in $(seq 1 60); do
        STATUS=$(wget -qO- \
          --header="Authorization: Bearer ${ARMUR_API_KEY}" \
          "http://localhost:4500/api/v1/status/${TASK_ID}" \
          | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
        if [ "$STATUS" = "success" ]; then
          echo "Scan complete"
          break
        fi
        echo "Status: $STATUS ($i/60)"
        sleep 10
      done
    # Fetch SARIF report
    - |
      wget -qO armur-results.sarif \
        --header="Authorization: Bearer ${ARMUR_API_KEY}" \
        "http://localhost:4500/api/v1/status/${TASK_ID}?format=sarif"
    # Optionally fail on severity
    - |
      if [ -n "${ARMUR_FAIL_ON_SEVERITY}" ]; then
        case "${ARMUR_FAIL_ON_SEVERITY}" in
          critical) LEVELS="error" ;;
          high)     LEVELS="error" ;;
          medium)   LEVELS="error warning" ;;
          low|info) LEVELS="error warning note" ;;
          *)        LEVELS="error" ;;
        esac
        COUNT=0
        for LEVEL in $LEVELS; do
          N=$(python3 -c "
import json
data = json.load(open('armur-results.sarif'))
count = sum(1 for run in data.get('runs',[]) for r in run.get('results',[]) if r.get('level')=='$LEVEL')
print(count)")
          COUNT=$((COUNT + N))
        done
        echo "Findings at '${ARMUR_FAIL_ON_SEVERITY}' or above: $COUNT"
        if [ "$COUNT" -gt 0 ]; then
          echo "ERROR: $COUNT finding(s) found at severity '${ARMUR_FAIL_ON_SEVERITY}' or above"
          exit 1
        fi
      fi
  after_script:
    - docker stop armur-server || true
  artifacts:
    name: armur-scan-results
    when: always
    paths:
      - armur-results.sarif
    reports:
      # GitLab Security Dashboard integration (SAST report format)
      # GitLab expects SAST reports; convert SARIF if needed.
      sast: armur-results.sarif
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "push"'
